buildscript {
    ext {
        buildToolsVersion = "33.0.0"
        minSdkVersion = 21
        compileSdkVersion = 33
        targetSdkVersion = 33
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle:7.4.1')
    }
}

allprojects {
    repositories {
        mavenLocal()
        maven {
            url 'https://maven.google.com'
        }
        mavenCentral {
            metafile = true
        }
    }
}

task wrapper(type: Wrapper) {
    gradleVersion = '7.5'
    distributionUrl = distributionUrl.replace("bin", "all")
}
